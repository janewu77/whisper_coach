<!-- @dsCard group="Components" viewport="700x560" name="Core — buttons, tags, chips, cards" subtitle="Buttons, icon buttons, tags, badges, chips & cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 22px 24px; }
  .grid { display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--text-secondary); text-transform: uppercase; letter-spacing: var(--tracking-label); margin-bottom: 10px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Tag, Badge, Chip, Card } = window.WhisperCoachDesignSystem_6c0cf7;
function Section({ label, children }) {
  return (<div><div className="lbl">{label}</div><div className="row">{children}</div></div>);
}
function Demo() {
  const [f, setF] = React.useState("4-3-3");
  const [rec, setRec] = React.useState(false);
  return (
    <div className="grid">
      <Section label="Buttons">
        <Button variant="primary" icon="wand">Generate lineup</Button>
        <Button variant="secondary">Edit</Button>
        <Button variant="subtle">Tinted</Button>
        <Button variant="ghost">Skip</Button>
        <Button variant="danger" icon="player-stop">End match</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </Section>
      <Section label="Sizes">
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg" icon="player-play">Start match</Button>
      </Section>
      <Section label="Icon buttons">
        <IconButton icon="microphone" variant="solid" recording={rec} label="Mic" onClick={() => setRec(!rec)} />
        <IconButton icon="send" variant="neutral" label="Send" />
        <IconButton icon="dots" variant="ghost" label="More" />
        <IconButton icon="plus" variant="solid" round label="Add" />
      </Section>
      <Section label="Tags">
        <Tag tone="green">Available</Tag>
        <Tag tone="amber">Doubtful</Tag>
        <Tag tone="red">In progress</Tag>
        <Tag tone="neutral">Bench</Tag>
        <Tag tone="inverse" icon="cpu">AI</Tag>
      </Section>
      <Section label="Badges">
        <Badge>14</Badge>
        <Badge tone="danger">3</Badge>
        <Badge tone="neutral">99+</Badge>
        <Badge dot tone="brand" />
      </Section>
      <Section label="Chips — formation picker">
        {["4-3-3", "4-2-3-1", "3-5-2"].map((x) => (
          <Chip key={x} selected={f === x} onClick={() => setF(x)}>{x}</Chip>
        ))}
      </Section>
      <Section label="Cards">
        <Card style={{ flex: 1 }}>White surface · hairline border · radius lg</Card>
        <Card tinted style={{ flex: 1 }}>
          <span style={{ color: "var(--text-brand)", fontWeight: 500, fontSize: 12 }}>AI reasoning</span><br />
          Tinted green variant for assistant content.
        </Card>
      </Section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
