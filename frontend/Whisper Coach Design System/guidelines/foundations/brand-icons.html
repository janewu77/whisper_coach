<!-- @dsCard group="Brand" viewport="700x150" name="Iconography — Tabler" subtitle="Tabler Icons webfont, ~22px, line style" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 22px 24px; color: var(--text-primary); }
  .row { display: flex; gap: 26px; flex-wrap: wrap; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; color: var(--text-secondary); }
  .ic i { font-size: 24px; color: var(--text-primary); }
  .ic span { font-size: 10px; color: var(--text-tertiary); }
  .ic.brand i { color: var(--brand); }
</style>
</head>
<body>
  <div class="row">
    <div class="ic brand"><i class="ti ti-ball-football"></i><span>ball-football</span></div>
    <div class="ic"><i class="ti ti-plus-circle"></i><span>plus-circle</span></div>
    <div class="ic"><i class="ti ti-layout-grid"></i><span>layout-grid</span></div>
    <div class="ic"><i class="ti ti-message-circle"></i><span>message-circle</span></div>
    <div class="ic"><i class="ti ti-cpu"></i><span>cpu</span></div>
    <div class="ic"><i class="ti ti-bulb"></i><span>bulb</span></div>
    <div class="ic"><i class="ti ti-wand"></i><span>wand</span></div>
    <div class="ic"><i class="ti ti-microphone"></i><span>microphone</span></div>
    <div class="ic"><i class="ti ti-camera"></i><span>camera</span></div>
    <div class="ic"><i class="ti ti-player-play"></i><span>player-play</span></div>
    <div class="ic"><i class="ti ti-whistle"></i><span>whistle</span></div>
    <div class="ic"><i class="ti ti-arrows-shuffle"></i><span>shuffle</span></div>
  </div>
</body>
</html>
