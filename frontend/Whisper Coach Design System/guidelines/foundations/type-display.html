<!-- @dsCard group="Type" viewport="700x180" name="Display & scores" subtitle="Hanken Grotesk — wordmark, big numbers, headlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px 24px; color: var(--text-primary); }
  .score { font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--display-md); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; color: var(--text-primary); }
  .score em { color: var(--brand); font-style: normal; }
  .h3 { font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--text-3xl); letter-spacing: var(--tracking-tight); margin-top: 6px; }
  .meta { font-size: 11px; color: var(--text-tertiary); margin-top: 12px; font-variant-numeric: tabular-nums; }
  .wrap { display: flex; align-items: baseline; gap: 28px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="score"><em>2</em>–1</div>
    <div>
      <div class="h3">Compact center recommended</div>
      <div class="meta">display-md 56 / text-3xl 28 · Hanken Grotesk · weight 700 · tabular-nums</div>
    </div>
  </div>
</body>
</html>
