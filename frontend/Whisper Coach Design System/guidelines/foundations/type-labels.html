<!-- @dsCard group="Type" viewport="700x170" name="Labels & numerals" subtitle="Uppercase tracked section labels + tabular stats" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px 24px; color: var(--text-primary); display: flex; gap: 40px; align-items: center; }
  .label { font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--text-secondary); text-transform: uppercase; letter-spacing: var(--tracking-label); }
  .spec { font-size: 10px; color: var(--text-tertiary); margin-top: 8px; }
  .stats { display: flex; gap: 24px; }
  .stat .num { font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--display-sm); font-variant-numeric: tabular-nums; letter-spacing: var(--tracking-tight); }
  .stat .cap { font-size: var(--text-xs); color: var(--text-secondary); text-transform: uppercase; letter-spacing: var(--tracking-label); }
</style>
</head>
<body>
  <div>
    <div class="label">Detected players</div>
    <div class="spec">text-xs · 11 · 500 · tracking 0.06em</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="num">14</div><div class="cap">Squad</div></div>
    <div class="stat"><div class="num">68%</div><div class="cap">Possession</div></div>
    <div class="stat"><div class="num">3</div><div class="cap">Subs</div></div>
  </div>
</body>
</html>
