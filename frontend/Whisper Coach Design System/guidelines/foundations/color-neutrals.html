<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ink & stone" subtitle="Warm-grey ramp for text, surfaces & dividers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px; color: var(--text-primary); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 56px; border-radius: var(--radius-md); border: var(--hairline); }
  .name { font-size: 11px; font-weight: var(--weight-medium); margin-top: 8px; }
  .hex { font-size: 11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--white)"></div><span class="name">white</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--stone-100)"></div><span class="name">stone-100</span><span class="hex">#F5F5F4</span></div>
    <div class="sw"><div class="chip" style="background:var(--stone-200)"></div><span class="name">stone-200</span><span class="hex">#E7E5E4</span></div>
    <div class="sw"><div class="chip" style="background:var(--stone-300)"></div><span class="name">stone-300</span><span class="hex">#D6D3D1</span></div>
    <div class="sw"><div class="chip" style="background:var(--stone-400)"></div><span class="name">stone-400</span><span class="hex">#A8A29E</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="name">ink-400</span><span class="hex">#999999</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><span class="name">ink-600</span><span class="hex">#666666</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="name">ink-900</span><span class="hex">#1A1A1A</span></div>
    <div class="sw"><div class="chip" style="background:var(--black)"></div><span class="name">black</span><span class="hex">#0A0A0A</span></div>
  </div>
</body>
</html>
