<!-- @dsCard group="Type" viewport="700x200" name="Titles & UI text" subtitle="System sans — the iOS workhorse, weights 400/500" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px 24px; color: var(--text-primary); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-size: 10px; color: var(--text-tertiary); white-space: nowrap; min-width: 150px; font-variant-numeric: tabular-nums; }
  .title { font-size: var(--text-xl); font-weight: var(--weight-medium); }
  .body { font-size: var(--text-md); font-weight: var(--weight-regular); color: var(--text-primary); }
  .secondary { font-size: var(--text-sm); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="spec">text-xl · 17 · 500</span><span class="title">Lineup · 4-3-3</span></div>
    <div class="line"><span class="spec">text-md · 14 · 400</span><span class="body">Drop the left-back ten metres deeper to cover.</span></div>
    <div class="line"><span class="spec">text-sm · 12 · 400</span><span class="secondary">vs FC Riverside · 38'</span></div>
  </div>
</body>
</html>
