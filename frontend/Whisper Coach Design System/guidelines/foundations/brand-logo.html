<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark & app mark" subtitle="Hanken Grotesk lockup + pitch-green football mark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 24px; color: var(--text-primary); display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .mark { width: 44px; height: 44px; border-radius: 13px; background: var(--brand); color: var(--text-on-brand); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-brand); }
  .mark i { font-size: 26px; }
  .word { font-family: var(--font-display); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
  .word .l1 { font-size: 24px; line-height: 1; }
  .word .l1 .coach { color: var(--brand); }
  .word .sub { font-size: 11px; font-weight: var(--weight-medium); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: var(--tracking-label); margin-top: 3px; font-family: var(--font-sans); }
  .inverse { background: var(--surface-inverse); padding: 16px 20px; border-radius: var(--radius-lg); }
  .inverse .word .l1 { color: var(--white); }
</style>
</head>
<body>
  <div class="lockup">
    <div class="mark"><i class="ti ti-ball-football"></i></div>
    <div class="word"><div class="l1">Whisper&nbsp;<span class="coach">Coach</span></div><div class="sub">Tactical AI</div></div>
  </div>
  <div class="inverse">
    <div class="lockup">
      <div class="mark"><i class="ti ti-ball-football"></i></div>
      <div class="word"><div class="l1">Whisper&nbsp;<span class="coach">Coach</span></div></div>
    </div>
  </div>
</body>
</html>
