<!-- @dsCard group="Colors" viewport="700x150" name="Brand green (emerald)" subtitle="Interactive / brand scale — 500 is primary" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px; color: var(--text-primary); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 56px; border-radius: var(--radius-md); border: var(--hairline); }
  .name { font-size: 11px; font-weight: var(--weight-medium); margin-top: 8px; }
  .hex { font-size: 11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .star { color: var(--brand); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-50)"></div><span class="name">50</span><span class="hex">#E1F5EE</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-100)"></div><span class="name">100</span><span class="hex">#C9EDE0</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-200)"></div><span class="name">200</span><span class="hex">#A6E0CC</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-300)"></div><span class="name">300</span><span class="hex">#5DCAA5</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-400)"></div><span class="name">400</span><span class="hex">#2FB389</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><span class="name">500 <span class="star">★</span></span><span class="hex">#1D9E75</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><span class="name">600</span><span class="hex">#168363</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"></div><span class="name">700</span><span class="hex">#0F6E56</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-800)"></div><span class="name">800</span><span class="hex">#0B5444</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-900)"></div><span class="name">900</span><span class="hex">#093F34</span></div>
  </div>
</body>
</html>
