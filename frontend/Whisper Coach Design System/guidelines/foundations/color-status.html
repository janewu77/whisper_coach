<!-- @dsCard group="Colors" viewport="700x150" name="Status / tactical colors" subtitle="Success, caution & risk — used as soft tag pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px; color: var(--text-primary); }
  .row { display: flex; gap: 16px; }
  .group { flex: 1; }
  .pill { display: inline-flex; align-items: center; font-size: 12px; font-weight: var(--weight-medium); padding: 4px 12px; border-radius: var(--radius-pill); }
  .label { font-size: 11px; color: var(--text-secondary); margin-top: 10px; text-transform: uppercase; letter-spacing: var(--tracking-label); }
  .pair { font-size: 11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; margin-top: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="group">
      <span class="pill" style="background:var(--success-bg);color:var(--success-fg)">On plan</span>
      <div class="label">Success</div>
      <div class="pair">bg #E1F5EE · fg #0F6E56</div>
    </div>
    <div class="group">
      <span class="pill" style="background:var(--warning-bg);color:var(--warning-fg)">Watch</span>
      <div class="label">Caution</div>
      <div class="pair">bg #FAEEDA · fg #854F0B</div>
    </div>
    <div class="group">
      <span class="pill" style="background:var(--danger-bg);color:var(--danger-fg)">At risk</span>
      <div class="label">Risk / live</div>
      <div class="pair">bg #FCEBEB · fg #A32D2D</div>
    </div>
    <div class="group">
      <span class="pill" style="background:var(--surface-inverse);color:var(--text-on-inverse)">AI</span>
      <div class="label">Inverse</div>
      <div class="pair">bg #0A0A0A · fg #FFFFFF</div>
    </div>
  </div>
</body>
</html>
