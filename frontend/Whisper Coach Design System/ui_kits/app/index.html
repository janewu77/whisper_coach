<!-- @dsCard group="App" viewport="1180x900" name="Screen reference — core flow" subtitle="New Match · Lineup · Live — layout & style reference (static)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whisper Coach — Screen Reference</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); padding: 32px; }
  .sheet { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .col__label { font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--text-secondary); text-transform: uppercase; letter-spacing: var(--tracking-label); }

  /* ---- phone shell (kit chrome — mirrors the product) ---- */
  .phone { width: 360px; height: 760px; background: var(--surface-card); border-radius: var(--radius-xl);
    border: var(--border-width-hairline) solid var(--border-subtle); overflow: hidden;
    display: flex; flex-direction: column; box-shadow: var(--shadow-app); }
  .statusbar { background: var(--surface-inverse); color: var(--white); font-size: var(--text-sm);
    padding: 10px 18px 7px; display: flex; justify-content: space-between; align-items: center; }
  .statusbar .name { font-weight: var(--weight-medium); font-size: var(--text-base); }
  .header { padding: 15px 16px 11px; border-bottom: var(--border-width-hairline) solid var(--border-subtle);
    display: flex; justify-content: space-between; align-items: flex-start; }
  .header h2 { font-size: var(--text-xl); font-weight: var(--weight-medium); margin: 0; }
  .header p { font-size: var(--text-sm); color: var(--text-secondary); margin: 2px 0 0; }
  .body { flex: 1; overflow: hidden; padding: 16px; display: flex; flex-direction: column; gap: var(--gap-card); }
  .seclabel { font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: var(--tracking-label); }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .chat { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 10px; }
  .composer { display: flex; gap: 8px; align-items: flex-end; padding-top: 4px; }
  .composer .grow { flex: 1; }
  .quick { display: flex; gap: 6px; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const DS = window.WhisperCoachDesignSystem_6c0cf7;
const { Button, IconButton, Tag, Chip, Card, Input, Select, UploadZone, ChatBubble, Pitch, TabBar } = DS;

const TABS = [
  { key: "create", label: "Create", icon: "plus-circle" },
  { key: "lineup", label: "Lineup", icon: "layout-grid" },
  { key: "live", label: "Live", icon: "message-circle" },
];

const PLAYERS = [
  { id: "gk", name: "H.Y", pos: "GK", x: 50, y: 88 },
  { id: "lb", name: "G.L", pos: "LB", x: 15, y: 72 },
  { id: "cb1", name: "K.M", pos: "CB", x: 37, y: 72 },
  { id: "cb2", name: "B.N", pos: "CB", x: 63, y: 72 },
  { id: "rb", name: "S.W", pos: "RB", x: 85, y: 72 },
  { id: "lcm", name: "T.H", pos: "LCM", x: 20, y: 52 },
  { id: "cm", name: "A.D", pos: "CM", x: 50, y: 50 },
  { id: "rcm", name: "F.R", pos: "RCM", x: 80, y: 52 },
  { id: "lw", name: "L.T", pos: "LW", x: 20, y: 28 },
  { id: "st", name: "O.S", pos: "ST", x: 50, y: 22 },
  { id: "rw", name: "J.P", pos: "RW", x: 80, y: 28 },
];

function Phone({ title, sub, right, tab, children }) {
  return (
    <div className="phone">
      <div className="statusbar">
        <span>9:41</span>
        <span className="name">Whisper Coach</span>
        <i className="ti ti-wifi" style={{ fontSize: 15 }} aria-hidden="true" />
      </div>
      <div className="header">
        <div><h2>{title}</h2>{sub && <p>{sub}</p>}</div>
        {right}
      </div>
      <div className="body">{children}</div>
      <TabBar items={TABS} value={tab} onChange={() => {}} />
    </div>
  );
}

function NewMatch() {
  return (
    <Phone title="New match" sub="Saturday · Local League · June 7" tab="create">
      <UploadZone status="done" count={14} />
      <div>
        <div className="seclabel" style={{ marginBottom: 8 }}>Detected players</div>
        <div className="tags">
          {["M. Chen","J. Park","L. Torres","K. Müller","A. Diallo","O. Saka"].map((n) => (
            <Tag key={n} tone="green">{n}</Tag>
          ))}
          <Tag tone="amber">D. Kowalski</Tag>
          <Tag tone="neutral">+7</Tag>
        </div>
      </div>
      <Card style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Input label="Opponent" defaultValue="FC Riverside" />
        <Select label="Match type" options={["Balanced — similar level","Strong opponent — defend first","Weaker opponent — press high"]} />
      </Card>
      <Button variant="primary" icon="wand" fullWidth>Generate lineup</Button>
    </Phone>
  );
}

function Lineup() {
  return (
    <Phone title="Lineup · 4-3-3" sub="vs FC Riverside · Compact center" tab="lineup" right={<Tag tone="inverse" icon="cpu">AI</Tag>}>
      <div className="tags">
        <Chip selected>4-3-3</Chip>
        <Chip>4-2-3-1</Chip>
        <Chip>3-5-2</Chip>
      </div>
      <Pitch players={PLAYERS} selectedId="st" aiBadge height={332} dotSize={34} />
      <Card tinted>
        <div style={{ fontSize: "var(--text-sm)", color: "var(--text-brand)", fontWeight: 500, marginBottom: 4, display: "flex", alignItems: "center", gap: 5 }}>
          <i className="ti ti-bulb" aria-hidden="true" />AI reasoning
        </div>
        <div style={{ fontSize: "var(--text-base)", lineHeight: "var(--leading-relaxed)" }}>
          4-3-3 gives a numerical edge in central midfield. Torres &amp; Park stretch the flanks.
        </div>
      </Card>
      <Button variant="primary" icon="player-play" fullWidth>Start match</Button>
    </Phone>
  );
}

function Live() {
  return (
    <Phone title="Live match" sub="vs FC Riverside · 38'" tab="live" right={<Tag tone="red">In progress</Tag>}>
      <div className="chat">
        <ChatBubble role="assistant">Match started. 4-3-3 active. Tap the mic or type to log events.</ChatBubble>
        <ChatBubble role="user">Left side exposed — Torres out of position.</ChatBubble>
        <ChatBubble role="assistant" time="23'" lead="Suggestion:">Drop Lima 10m deeper and rotate Torres to track the run.</ChatBubble>
        <ChatBubble role="user">Diallo is tired.</ChatBubble>
        <ChatBubble role="assistant" time="35'" lead="Substitution:">Bring on Kowalski for fresh legs in the middle.</ChatBubble>
      </div>
      <div className="composer">
        <IconButton icon="microphone" variant="solid" label="Voice" />
        <Input className="grow" placeholder="Type event or ask for advice…" />
        <IconButton icon="send" variant="neutral" label="Send" />
      </div>
      <div className="quick">
        <Chip icon="ball-football">Goal</Chip>
        <Chip icon="ambulance">Injury</Chip>
        <Chip icon="clipboard-text">Summary</Chip>
      </div>
    </Phone>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <div className="sheet">
    <div className="col"><span className="col__label">1 · Create match</span><NewMatch /></div>
    <div className="col"><span className="col__label">2 · Lineup</span><Lineup /></div>
    <div className="col"><span className="col__label">3 · Live match</span><Live /></div>
  </div>
);
</script>
</body>
</html>
