name: whisper_coach
description: AI football coaching assistant — Whisper Coach MVP
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3
  http_parser: ^4.0.2

  # Media
  image_picker: ^1.1.2      # camera / gallery for roster photo
  record: ^6.2.1             # audio recording for voice notes
  path_provider: ^2.1.3      # temp dir for audio files

  # State & utils
  provider: ^6.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9
  http_mock_adapter: ^0.6.1
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
