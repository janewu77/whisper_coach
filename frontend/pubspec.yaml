name: whisper_coach
description: AI football coaching assistant — Whisper Coach MVP
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3
  http_parser: ^4.0.2

  # Auth — Auth0 login (web via auth0-spa-js, native via system browser)
  auth0_flutter: ^1.7.0

  # Media
  image_picker: ^1.1.2      # camera / gallery for roster photo
  image: ^4.2.0              # pure-Dart crop of the roster photo (all platforms)
  record: ^6.2.1             # audio recording for voice notes
  path_provider: ^2.1.3      # temp dir for audio files

  # State & utils
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2  # persist profile settings (speaker language)

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9
  http_mock_adapter: ^0.6.1
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/whisper_coach_logo.png
